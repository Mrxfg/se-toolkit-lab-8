services:
  backend:
    build:
      context: ./backend
      args:
        REGISTRY_PREFIX_DOCKER_HUB: ${REGISTRY_PREFIX_DOCKER_HUB:-}
    restart: unless-stopped
    networks:
      - lms-network
    ports:
      - ${BACKEND_HOST_ADDRESS}:${BACKEND_HOST_PORT}:${BACKEND_CONTAINER_PORT}
    environment:
      - NAME=${BACKEND_NAME}
      - DEBUG=${BACKEND_DEBUG}
      - ADDRESS=${BACKEND_CONTAINER_ADDRESS}
      - PORT=${BACKEND_CONTAINER_PORT}
      - RELOAD=${BACKEND_RELOAD}
      - UVICORN_HOST=${BACKEND_CONTAINER_ADDRESS}
      - UVICORN_PORT=${BACKEND_CONTAINER_PORT}
      - UVICORN_RELOAD=${BACKEND_RELOAD}
      - CORS_ORIGINS=${BACKEND_CORS_ORIGINS:-[]}
      - LMS_API_KEY=${LMS_API_KEY}
      - BACKEND_ENABLE_INTERACTIONS=${BACKEND_ENABLE_INTERACTIONS}
      - BACKEND_ENABLE_LEARNERS=${BACKEND_ENABLE_LEARNERS}
      - AUTOCHECKER_API_URL=${AUTOCHECKER_API_URL}
      - AUTOCHECKER_API_LOGIN=${AUTOCHECKER_API_LOGIN}
      - AUTOCHECKER_API_PASSWORD=${AUTOCHECKER_API_PASSWORD}
      - DB_HOST=${CONST_POSTGRESQL_SERVICE_NAME}
      - DB_PORT=${CONST_POSTGRESQL_DEFAULT_PORT}
      - DB_NAME=${POSTGRES_DB}
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - OTEL_SERVICE_NAME=${BACKEND_NAME}
      - OTEL_TRACES_EXPORTER=otlp
      - OTEL_METRICS_EXPORTER=none
      - OTEL_LOGS_EXPORTER=otlp
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:${CONST_OTEL_COLLECTOR_GRPC_PORT}
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_PYTHON_LOG_CORRELATION=true
    depends_on:
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started

  postgres:
    image: ${REGISTRY_PREFIX_DOCKER_HUB:-}postgres:18.3-alpine
    restart: unless-stopped
    networks:
      - lms-network
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - ${POSTGRES_HOST_ADDRESS}:${POSTGRES_HOST_PORT}:${CONST_POSTGRESQL_DEFAULT_PORT}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/app/data/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: ${REGISTRY_PREFIX_DOCKER_HUB:-}dpage/pgadmin4:latest
    restart: unless-stopped
    networks:
      - lms-network
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_EMAIL}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_PASSWORD}
      - SCRIPT_NAME=/utils/pgadmin
    ports:
      - ${PGADMIN_HOST_ADDRESS}:${PGADMIN_HOST_PORT}:80
    depends_on:
      postgres:
        condition: service_healthy

  client-web-react:
    build:
      context: client-web-react/
      args:
        REGISTRY_PREFIX_DOCKER_HUB: ${REGISTRY_PREFIX_DOCKER_HUB:-}
    volumes:
      - client-web-react:/output

  nanobot:
    build:
      context: ./nanobot
      additional_contexts:
        workspace: .
    restart: unless-stopped
    networks:
      - lms-network
    environment:
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_API_BASE_URL=http://qwen-code-api:${QWEN_CODE_API_CONTAINER_PORT}/v1
      - LLM_API_MODEL=${LLM_API_MODEL}
      - NANOBOT_LMS_BACKEND_URL=http://backend:${BACKEND_CONTAINER_PORT}
      - NANOBOT_LMS_API_KEY=${LMS_API_KEY}
      - NANOBOT_LOGS_BASE_URL=http://victorialogs:${CONST_VICTORIALOGS_CONTAINER_PORT}
      - NANOBOT_TRACES_BASE_URL=http://victoriatraces:${CONST_VICTORIATRACES_CONTAINER_PORT}
      - NANOBOT_GATEWAY_CONTAINER_ADDRESS=${NANOBOT_GATEWAY_CONTAINER_ADDRESS}
      - NANOBOT_GATEWAY_CONTAINER_PORT=${NANOBOT_GATEWAY_CONTAINER_PORT}
      - NANOBOT_WEBCHAT_CONTAINER_ADDRESS=${NANOBOT_WEBCHAT_CONTAINER_ADDRESS}
      - NANOBOT_WEBCHAT_CONTAINER_PORT=${NANOBOT_WEBCHAT_CONTAINER_PORT}
      - NANOBOT_ACCESS_KEY=${NANOBOT_ACCESS_KEY}
    depends_on:
      - backend
      - qwen-code-api

  client-web-flutter:
    build:
      context: ./nanobot-websocket-channel/client-web-flutter
      args:
        REGISTRY_PREFIX_DOCKER_HUB: ${REGISTRY_PREFIX_DOCKER_HUB:-}
        REGISTRY_PREFIX_GHCR: ${REGISTRY_PREFIX_GHCR:-}
    volumes:
      - client-web-flutter:/output

  caddy:
    image: ${REGISTRY_PREFIX_DOCKER_HUB:-}caddy:2.11-alpine
    networks:
      - lms-network
    depends_on:
      - backend
      - client-web-react
      - client-web-flutter
      - nanobot
      - qwen-code-api
      - victorialogs
      - victoriatraces
    environment:
      - CADDY_CONTAINER_PORT=${CADDY_CONTAINER_PORT}
      - BACKEND_CONTAINER_PORT=${BACKEND_CONTAINER_PORT}
      - NANOBOT_WEBCHAT_CONTAINER_PORT=${NANOBOT_WEBCHAT_CONTAINER_PORT}
      - QWEN_CODE_API_CONTAINER_PORT=${QWEN_CODE_API_CONTAINER_PORT}
      - CONST_PGADMIN_CONTAINER_PORT=${CONST_PGADMIN_CONTAINER_PORT}
      - CONST_VICTORIALOGS_CONTAINER_PORT=${CONST_VICTORIALOGS_CONTAINER_PORT}
      - CONST_VICTORIATRACES_CONTAINER_PORT=${CONST_VICTORIATRACES_CONTAINER_PORT}
    ports:
      - ${GATEWAY_HOST_ADDRESS}:${GATEWAY_PORT}:${CADDY_CONTAINER_PORT}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - client-web-react:/srv/react:ro
      - client-web-flutter:/srv/flutter:ro

  qwen-code-api:
    build:
      context: ./qwen-code-api
      dockerfile: docker/qwen-code-api.Dockerfile
      args:
        REGISTRY_PREFIX_DOCKER_HUB: ${REGISTRY_PREFIX_DOCKER_HUB:-}
    restart: unless-stopped
    networks:
      - lms-network
    ports:
      - ${QWEN_CODE_API_HOST_ADDRESS}:${QWEN_CODE_API_HOST_PORT}:${QWEN_CODE_API_CONTAINER_PORT:-8080}
    volumes:
      - ~/.qwen:/mnt/qwen-creds:ro
    environment:
      - PORT=${QWEN_CODE_API_CONTAINER_PORT:-8080}
      - ADDRESS=${QWEN_CODE_API_CONTAINER_ADDRESS:-0.0.0.0}
      - DEFAULT_MODEL=${QWEN_CODE_API_MODEL}
      - LOG_LEVEL=${QWEN_CODE_API_LOG_LEVEL}
      - MAX_RETRIES=${QWEN_CODE_API_MAX_RETRIES}
      - RETRY_DELAY_MS=${QWEN_CODE_API_RETRY_DELAY_MS}
      - QWEN_CODE_AUTH_USE=${QWEN_CODE_API_AUTH_USE}
      - LOG_REQUESTS=${QWEN_CODE_API_LOG_REQUESTS}
      - QWEN_CODE_API_KEY=${QWEN_CODE_API_KEY}
    healthcheck:
      test:
        - CMD
        - python
        - "-c"
        - |
          import urllib.request
          req = urllib.request.Request(
              'http://localhost:${QWEN_CODE_API_CONTAINER_PORT:-8080}/health',
              headers={'X-API-Key': '${QWEN_CODE_API_KEY:-}'}
          )
          urllib.request.urlopen(req)
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  victorialogs:
    image: ${REGISTRY_PREFIX_DOCKER_HUB:-}victoriametrics/victoria-logs:latest
    restart: unless-stopped
    networks:
      - lms-network
    ports:
      - ${VICTORIALOGS_HOST_ADDRESS}:${VICTORIALOGS_HOST_PORT}:${CONST_VICTORIALOGS_CONTAINER_PORT}
    volumes:
      - victorialogs_data:/victoria-logs-data
    command:
      - -storageDataPath=/victoria-logs-data
      - -retentionPeriod=7d

  victoriatraces:
    image: ${REGISTRY_PREFIX_DOCKER_HUB:-}victoriametrics/victoria-traces:latest
    restart: unless-stopped
    networks:
      - lms-network
    ports:
      - ${VICTORIATRACES_HOST_ADDRESS}:${VICTORIATRACES_HOST_PORT}:${CONST_VICTORIATRACES_CONTAINER_PORT}
    volumes:
      - victoriatraces_data:/victoria-traces-data
    command:
      - -storageDataPath=/victoria-traces-data
      - -retentionPeriod=7d

  otel-collector:
    image: ${REGISTRY_PREFIX_DOCKER_HUB:-}otel/opentelemetry-collector-contrib:latest
    restart: unless-stopped
    networks:
      - lms-network
    volumes:
      - ./otel-collector/config.yaml:/etc/otelcol-contrib/config.yaml
    depends_on:
      - victorialogs
      - victoriatraces

volumes:
  postgres_data:
  client-web-react:
  client-web-flutter:
  victorialogs_data:
  victoriatraces_data:

networks:
  lms-network:
    name: lms-network
    attachable: true
